asyncapi: 3.0.0
info:
  title: 航路予約
  version: 1.0.0
  description: 航路予約通知に関するMQTTのインタフェース仕様書
defaultContentType: application/json
servers:
  activemq:
    host: '{url}:8883'
    protocol: mqtts
    description: MQTTブローカー
channels:
  airwayReservation:
    address: airway/operator/{operatorId}/airwayReservation/{airwayReservationId}
    messages:
      airwayReserved:
        $ref: '#/components/messages/airwayReservation'
      airwayReservationCanceled:
        $ref: '#/components/messages/airwayReservationCancellation'
      airwayReservationRescinded:
        $ref: '#/components/messages/airwayReservationRescission'
    description: 航路予約通知トピック
    parameters:
      operatorId:
        description: 運航事業者ID
      airwayReservationId:
        description: 航路予約ID
operations:
  airwayReservation:
    action: receive
    channel:
      $ref: '#/channels/airwayReservation'
    messages:
      - $ref: '#/channels/airwayReservation/messages/airwayReserved'
      - $ref: '#/channels/airwayReservation/messages/airwayReservationCanceled'
      - $ref: '#/channels/airwayReservation/messages/airwayReservationRescinded'
components:
  messages:
    airwayReservation:
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AirwayReservation'
    airwayReservationCancellation:
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AirwayReservationCancellation'
    airwayReservationRescission:
      contentType: application/json
      payload:
        $ref: '#/components/schemas/AirwayReservationRescission'
  schemas:
    AirwayReservation:
      type: object
      description: 航路事業者が航路予約した際のペイロード
      properties:
        eventId:
          type: string
          format: uuid
          description: PublishイベントID
          example: 123e4567-e89b-12d3-a456-426614174000
        airwayReservationId:
          type: string
          format: uuid
          description: 航路予約ID
          example: 123e4567-e89b-12d3-a456-426614174000
        operatorId:
          type: string
          format: uuid
          description: 運航事業者(予約者)ID
          example: 123e4567-e89b-12d3-a456-426614174000
        airwaySections:
          $ref: '#/components/schemas/AirwaySections'
        status:
          type: string
          enum:
            - 'RESERVED'
            - 'CANCELED'
            - 'RESCINDED'
          description: 予約状態
          example: 'RESERVED'
        reservedAt:
          type: string
          format: date-time
          description: 予約完了日時
          example: '2024-12-13T18:53:38Z'
        updatedAt:
          type: string
          format: date-time
          description: 予約状態更新日時
          example: ''
    AirwayReservationCancellation:
      type: object
      description: 航路予約が航路事業者側からキャンセルされた際のペイロード
      properties:
        eventId:
          type: string
          format: uuid
          description: PublishイベントID
          example: 123e4567-e89b-12d3-a456-426614174000
        airwayReservationId:
          type: string
          format: uuid
          description: 航路予約ID
          example: 123e4567-e89b-12d3-a456-426614174000
        operatorId:
          type: string
          format: uuid
          description: 運航事業者(予約者)ID
          example: 123e4567-e89b-12d3-a456-426614174000
        airwaySections:
          $ref: '#/components/schemas/AirwaySections'
        status:
          type: string
          enum:
            - 'RESERVED'
            - 'CANCELED'
            - 'RESCINDED'
          description: 予約状態
          example: 'CANCELED'
        reservedAt:
          type: string
          format: date-time
          description: 予約完了日時
          example: '2024-12-13T18:53:38Z'
        updatedAt:
          type: string
          format: date-time
          description: 予約状態更新日時
          example: '2024-12-13T18:53:38Z'
    AirwayReservationRescission:
      type: object
      description: 航路予約が航路運営者側から撤回された際のペイロード
      properties:
        eventId:
          type: string
          format: uuid
          description: PublishイベントID
          example: 123e4567-e89b-12d3-a456-426614174000
        airwayReservationId:
          type: string
          format: uuid
          description: 航路予約ID
          example: 123e4567-e89b-12d3-a456-426614174000
        operatorId:
          type: string
          format: uuid
          description: 運航事業者(予約者)ID
          example: 123e4567-e89b-12d3-a456-426614174000
        airwaySections:
          $ref: '#/components/schemas/AirwaySections'
        status:
          type: string
          enum:
            - 'RESERVED'
            - 'CANCELED'
            - 'RESCINDED'
          description: 予約状態
          example: 'RESCINDED'
        reservedAt:
          type: string
          format: date-time
          description: 予約完了日時
          example: '2024-12-13T18:53:38Z'
        updatedAt:
          type: string
          format: date-time
          description: 予約状態更新日時
          example: '2024-12-13T18:53:38Z'
    AirwaySections:
      type: array
      description: 航路区画毎の確保時間
      items:
        type: object
        properties:
          airwaySectionId:
            type: string
            format: uuid
            description: 航路区画ID
            example: 123e4567-e89b-12d3-a456-426614174000
          startAt:
            type: string
            format: date-time
            description: 予約開始日時
            example: '2024-12-13T18:53:38Z'
          endAt:
            type: string
            format: date-time
            description: 予約終了日時
            example: '2024-12-13T18:53:38Z'

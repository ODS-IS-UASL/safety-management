
openapi: 3.0.0
info:
  title: 安全管理支援(A-1-4) API
  version: 1.0.0
tags:
  - name: AirwayReservation
    description: 安全管理支援(A-1-4)のコントローラクラス。
paths:
  /airway-reservation-notification:
    post:
      summary: 航路予約情報の通知
      description: 機体ID(リモートID)と航路予約毎の識別IDを受信し、航路予約(A-1-3)へ航路予約毎の識別IDを送信し予約情報を受信、機体ID(リモートID)と紐づけ保存します。
      operationId: notifyAirwayReservation
      tags:
        - AirwayReservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirwayReservationNotificationEntity'
      responses:
        '201':
          description: 作成成功
        '400':
          description: 入力チェックエラー
          $ref: '#/components/responses/400'
        '500':
          description: サーバーエラー
          $ref: '#/components/responses/500'
  /airway-reservation-deletion/{airwayReservationId}:
    delete:
      summary: 航路予約情報の削除
      description: 航路の安全管理支援(A-1-4)へ通知した航路予約情報を削除する。
      operationId: deleteAirwayReservation
      tags:
        - AirwayReservation
      parameters:
        - $ref: "#/components/parameters/airwayReservationId"
      responses:
        '204':
          description: 削除成功
        '400':
          description: 入力チェックエラー
          $ref: '#/components/responses/400'
        '500':
          description: サーバーエラー
          $ref: '#/components/responses/500'
components:
  parameters:
    airwayReservationId:
      name: airwayReservationId
      in: path
      required: true
      schema:
        type: string
      description: 航路予約毎の識別ID
  schemas:
    AirwayReservationNotificationEntity:
      type: object
      description: 機体ID(リモートID)と航路予約毎の識別IDを受信し、予約情報を保存API用のentity
      properties:
        aircraftId:
          type: string
          x-baseName: aircraftId
          description: 機体ID
        airwayReservationId:
          type: string
          x-baseName: airwayReservationId
          description: 航路予約毎の識別ID
      required:
        - aircraftId
        - airwayReservationId
    ErrorResponseEntity:
      type: object
      description: エラー時のResponse用Entity
      properties:
        code:
          type: string
          description: エラーコード
          example: "400"
        message:
          type: string
          description: エラーメッセージ
          example: "入力チェックエラー"
        description:
          type: string
          description: 詳細
          example: "0 以上の値にしてください"
  responses:
    '400':
      description: 入力チェックエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEntity'
    '500':
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseEntity'
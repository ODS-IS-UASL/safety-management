asyncapi: 3.0.0
info:
  title: 鉄道運行 運行ダイヤ変更通知登録
  description: 駅名を２つ指定してダイヤ変更通知を登録する
  version: 1.0.0
  tags:
  - name: railwayService
    description: 鉄道運行
defaultContentType: application/json
servers:
  activemq:
    host: '{url}:8883'
    protocol: mqtts
    title: MQTTブローカー
    
channels:
  regist:
    address: 'railwayService/notify/regist'
    title: 運行ダイヤ変更通知登録
    description: 運行ダイヤ情報を利用するシステムは駅名を２つ指定して変更通知を登録する
    messages:
      regist:
        $ref: '#/components/messages/regist'
  notify:
    address: 'railwayService/notify/notify'
    title: 運行ダイヤ変更通知
    description: |
      運行ダイヤの変更を通知する
      運行ダイヤ情報を利用するシステムは変更通知登録時にトピックにサブスクライブする
    messages:
      notify:
        $ref: '#/components/messages/notify'

operations:
  regist:
    action: send
    channel:
      $ref: '#/channels/regist'
    messages:
      - $ref: '#/channels/regist/messages/regist'
  notify:
    action: receive
    channel:
      $ref: '#/channels/notify'
    messages:
      - $ref: '#/channels/notify/messages/notify'

components:
  schemas:
    Regist:
      type: object
      description: 運行ダイヤ変更通知登録のリクエスト
      properties:
        station1:
          type: string
          description: 駅名
        station2:
          type: string
          description: 駅名
      example: {
        "station1": "西部秩父駅",
        "station2": "横瀬"
      }
    Notify:
      type: object
      description: 運行ダイヤ変更通知
      properties:
        station1:
          type: string
          description: 駅名
        station2:
          type: string
          description: 駅名
        timeBefore:
          type: array
          description: 変更前時刻リスト(JST)
          items:
            type: array
            items:
              type: string
        timeAfter:
          type: array
          description: 変更後時刻リスト(JST)
          items:
            type: array
            items:
              type: string
      example: {
        "station1": "西部秩父駅",
        "station2": "横瀬",
        "timeBefore": [
          ["11:08", "11:11"],
          ["11:24", "11:27"]
        ],
        "timeAfter":[
          ["11:29", "11:32"]
        ]
      }

  messages:
    regist:
      summary: 運行ダイヤ変更通知登録
      payload:
        $ref: '#/components/schemas/Regist'
    notify:
      summary: 運行ダイヤ変更通知
      payload:
        $ref: '#/components/schemas/Notify'
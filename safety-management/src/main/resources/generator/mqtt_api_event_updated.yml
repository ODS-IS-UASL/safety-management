asyncapi: 3.0.0
info:
  title: イベント／規制空域 イベント規制空域変更通知登録
  description: 経度緯度の範囲と時刻の範囲を指定してイベントや規制空域の追加・削除通知のSubscribeを行う
  version: 1.0.0
  tags:
  - name: event
    description: イベント／規制空域
defaultContentType: application/json
servers:
  activemq:
    host: '{url}:8883'
    protocol: mqtts
    title: MQTTブローカー

channels:
  subscribeEvent:
    address: 'event/updated'
    title: イベント規制空域変更通知登録
    description: 経度緯度の範囲と時刻の範囲を指定してイベントや規制空域の追加・削除通知のSubscribeを行う
    messages:
      subscribeEvent:
        $ref: '#/components/messages/subscribeEvent'
        description: 航路運営者ID
  publishEvent:
    title: イベント規制空域変更通知
    messages:
      publishEvent:
        $ref: '#/components/messages/publishEvent'

operations:
  subscribeEvent:
    action: send
    channel:
      $ref: '#/channels/subscribeEvent'
    messages:
      - $ref: '#/channels/subscribeEvent/messages/subscribeEvent'
  publishEvent:
    action: receive
    channel:
      $ref: '#/channels/publishEvent'
    messages:
      - $ref: '#/channels/publishEvent/messages/publishEvent'

components:
  schemas:
    SubscribeEvent:
      type: object
      description: イベント規制空域変更通知登録のリクエスト
      properties:
        airSpace:
          type: array
          description: 経度緯度の範囲を示すPolygon
          items:
            type: array
            description: 経度, 緯度
            items:
              type: number
            example: [139.05112277756052, 35.94823878982743]
          example: [
            [139.05112277756052, 35.94823878982743], 
            [139.05113414436588, 35.94786150811187],
            [139.05620373955822, 35.94880930997533],
            [139.05655611052450, 335.9484504348790],
            [139.05112277756052, 35.94823878982743]
          ]
        timeScope:
          type: array
          description: |
            時刻の範囲(UTC)
            ※version1.0.0ではJSTで同一日とする
          items:
            type: string
          example: ["2025-01-09T23:00:00Z", "2025-01-10T08:00:00Z"]
    PublishEvent:
      type: object
      description: イベント規制空域変更通知
      properties:
        restrictAirSpace:
          type: array
          description: 規制空域の範囲を示すPolygon
          items:
            type: array
            description: 経度, 緯度
            items:
              type: number
            example: [139.05047486965475, 35.94850564653847]
          example: [
            [139.05047486965475, 35.94850564653847],
            [139.05079314020497, 35.94753023487624],
            [139.05189572032526, 35.94778789195730],
            [139.05223672448620, 35.94853325235369],
            [139.05047486965475, 35.94850564653847]
          ]
        restrictTimeScope:
          type: array
          description: 規制期間日時(UTC)
          items:
            type: string
          example: ["2025-01-10T01:00:00Z", "2025-01-10T03:00:00Z"]
        description:
          type: string
          description: 規制の情報
          example: "航空イベントによる規制"
        notification:
          type: string
          description: 通知種別
          enum: ["Add", "Update", "Delete"]
          example: "Add"

  messages:
    subscribeEvent:
      summary: イベント規制空域変更通知登録
      payload:
        $ref: '#/components/schemas/SubscribeEvent'
    publishEvent:
      summary: イベント規制空域変更通知
      payload:
        $ref: '#/components/schemas/PublishEvent'

